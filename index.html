<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://kit.fontawesome.com/913fc2502a.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div><h1>Task Manager</h1></div>
    <div>
     <button class="theme-toggle-btn" aria-label="Toggle Theme"> <span class="icon">🌙</span> Dark Mode ON </button>
    </div>
    </nav>

    <main>
    
     <section class="main-card">
       <form class="task-form">
        <div class="input-group">
          <input type="text" placeholder="What needs to be done?" required class="task-input">
        </div>
        <div class="form-controls">
          <select class="category-dropdown">
              <option value="work">💼 Work</option>
              <option value="study">📚 Study</option>
              <option value="personal">🏡 Personal</option>
          </select>
          <button type="submit" class="btn btn-primary">Add Task</button>
        </div>
      </form>
     </section>


   <section class="secound-card">
      <section class="toolbar">
          <input type="text" placeholder="Search tasks..." class="search-bar">
        <select class="filter-dropdown">
          <option value="all">All Categories</option>
          <option value="work">Work</option>
          <option value="study">Study</option>
          <option value="personal">Personal</option>
        </select>
      </section>

    <section class="stats-container">
      <div class="stat-card">
        <span class="stat-label">Total Tasks</span>
        <span class="stat-value" id="total-tasks">3</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Completed</span>
        <span  class="stat-value" id="completed-tasks">1</span>
      </div>
    </section>
 </section>

<section class="task-list">
  
     

      <div class="task-card completed">
        <div class="task-details">
          <h3 class="task-title">Read Chapter 4 of Javascript Book</h3>
          <div class="task-tags">
            <span class="badge badge-study">Study</span>
            <span class="status-label status-completed">Completed</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="btn btn-action btn-edit">Edit</button>
          <button class="btn btn-action btn-complete">Undo</button>
          <button class="btn btn-action btn-delete">Delete</button>
        </div>
      </div>

      <div class="task-card">
        <div class="task-details">
          <h3 class="task-title">Buy groceries for the week</h3>
          <div class="task-tags">
            <span class="badge badge-personal">Personal</span>
            <span class="status-label status-pending">Pending</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="btn btn-action btn-edit">Edit</button>
          <button class="btn btn-action btn-complete">Complete</button>
          <button  class="btn btn-action btn-delete">Delete</button>
        </div>
      </div>

      </section>
    </main>

    <div id="taskContainer">
  <button class="delete">Delete</button>
  <button class="complete">Complete</button>
    </div>
<div id="grand">
  Grandparent
  <div id="parent">
    Parent
    <button id="child">Child</button>
  </div>
</div>


<section class="pipeline-section">

  <h2>Browser Rendering Pipeline</h2>

  <div class="pipeline">

    <div class="step">HTML</div>
    <div class="arrow">↓</div>

    <div class="step">Parsing</div>
    <div class="arrow">↓</div>

    <div class="step">Tokenization</div>
    <div class="arrow">↓</div>

    <div class="step">DOM Tree</div>

    <div class="plus">+</div>

    <div class="step">CSSOM Tree</div>

    <div class="arrow">↓</div>

    <div class="step highlight">Render Tree</div>

  </div>

</section>
    <script src="script.js"></script>

</body>
</html>
